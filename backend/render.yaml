services:
  - type: web
    name: etf-brasil-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
    disk:
      name: etf-data
      mountPath: /app/data
      sizeGB: 1
